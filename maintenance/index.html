<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareGo — Coming Soon</title>
  <meta name="description" content="CareGo is an AI-powered care platform. We're putting the finishing touches on something special." />
  <!-- Prevent indexing while in maintenance -->
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f7f6f2;
      --color-surface: #ffffff;
      --color-text: #1a1a1a;
      --color-text-muted: #6b6b6b;
      --color-primary: #01696f;
      --color-primary-light: #e0f0ef;
      --color-border: rgba(0,0,0,0.08);
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-full: 9999px;
    }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      font-family: var(--font-body);
      color: var(--color-text);
      padding: 2rem 1.5rem;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 1.25rem;
      padding: clamp(2.5rem, 6vw, 4rem) clamp(2rem, 6vw, 4rem);
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--color-primary);
      letter-spacing: -0.01em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      background: var(--color-primary-light);
      color: var(--color-primary);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.375rem 0.875rem;
      border-radius: var(--radius-full);
      margin-bottom: 1.5rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--color-primary);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--color-text);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    h1 em {
      color: var(--color-primary);
      font-style: italic;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--color-text-muted);
      max-width: 42ch;
      margin: 0 auto 2rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--color-primary-light);
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2.5s ease-in-out infinite;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #b0b0b0;
      text-align: center;
    }

    @media (prefers-reduced-motion: reduce) {
      .badge-dot, .status-indicator { animation: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- SVG Logo -->
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="CareGo logo">
        <rect width="40" height="40" rx="10" fill="#01696f"/>
        <path d="M20 10C14.477 10 10 14.477 10 20C10 25.523 14.477 30 20 30C22.652 30 25.065 29.004 26.9 27.363" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M26 19L20 13L14 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 13V26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">CareGo</span>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      We're launching soon
    </div>

    <h1>Intelligent care,<br><em>beautifully simple.</em></h1>

    <p>We're putting the finishing touches on the CareGo platform. Something thoughtfully designed is on its way.</p>

    <div class="divider"></div>

    <div class="status-row">
      <span class="status-indicator"></span>
      <span>Platform in development &mdash; check back soon</span>
    </div>
  </div>

  <footer>
    &copy; 2026 CareGo Health Limited &nbsp;&middot;&nbsp; Registered in England &amp; Wales
  </footer>
</body>
</html>
